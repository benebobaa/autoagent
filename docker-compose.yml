services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: yield_agent
      POSTGRES_PASSWORD: yield_agent
      POSTGRES_DB: yield_agent
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U yield_agent -d yield_agent']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  agent:
    build: .
    container_name: solana-yield-agent
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://yield_agent:yield_agent@postgres:5432/yield_agent
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - agent_logs:/app/logs

volumes:
  postgres_data:
  agent_logs:
