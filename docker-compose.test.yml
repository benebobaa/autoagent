services:
  postgres_test:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: yield_agent_test
      POSTGRES_PASSWORD: yield_agent_test
      POSTGRES_DB: yield_agent_test
    ports:
      - '5433:5432'
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U yield_agent_test -d yield_agent_test']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  postgres_test_data:
    name: solana-yield-agent-test-postgres-data
